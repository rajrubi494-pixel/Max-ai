<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max AI Assistant</title>
    <style>
        /* CSS: Styling and UI */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #000; 
            background: radial-gradient(circle, #200010, #000); 
            color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden;
        }

        /* Stats Bar (Time & Battery) */
        .stats-bar { 
            position: absolute; top: 20px; width: 90%; display: flex; justify-content: space-between;
            color: #ff007f; font-weight: bold; font-size: 14px; text-shadow: 0 0 10px #ff007f;
        }

        /* Robotic Heart UI */
        .heart-box { position: relative; width: 220px; height: 220px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .heart-svg { width: 130px; fill: #ff007f; filter: drop-shadow(0 0 15px #ff007f); transition: 0.4s; }
        
        /* Heartbeat Animation when Active */
        .active .heart-svg { animation: heartBeat 0.8s infinite alternate; filter: drop-shadow(0 0 40px #ff00ff); }
        @keyframes heartBeat {
            from { transform: scale(1); }
            to { transform: scale(1.15); }
        }

        /* Status & Logs */
        #status-text { margin-top: 35px; color: #ff007f; font-size: 26px; text-align: center; text-shadow: 0 0 10px #ff007f; height: 40px; }
        #log-text { margin-top: 10px; color: #ff99cc; font-size: 16px; opacity: 0.6; text-align: center; font-style: italic; }

        /* Footer Branding */
        .footer { position: absolute; bottom: 25px; color: rgba(255, 0, 127, 0.3); font-size: 11px; letter-spacing: 4px; }
        .footer b { color: #ff007f; }

        /* Background Rings Decoration */
        .ring { position: absolute; border: 1px solid #ff007f; border-radius: 50%; opacity: 0.1; animation: rotate 15s linear infinite; }
        @keyframes rotate { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="stats-bar">
        <div id="ui-time">00:00</div>
        <div id="ui-batt">BATT: --%</div>
    </div>

    <div class="heart-box" id="maxTrigger" onclick="toggleMax()">
        <div class="ring" style="width:250px; height:250px; border-style:dashed;"></div>
        <svg class="heart-svg" viewBox="0 0 24 24">
            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
        </svg>
    </div>

    <h1 id="status-text">CORE STANDBY</h1>
    <p id="log-text">Tap the Heart to Wake Max</p>

    <div class="footer">BUILD BY <b>ARYAN</b></div>

    <script>
        const statusH = document.getElementById('status-text');
        const logP = document.getElementById('log-text');
        const trigger = document.getElementById('maxTrigger');

        let isMaxActive = false;

        // 1. Time & Battery Update
        function refreshStats() {
            const d = new Date();
            document.getElementById('ui-time').innerText = d.getHours().toString().padStart(2, '0') + ":" + d.getMinutes().toString().padStart(2, '0');
            
            if (navigator.getBattery) {
                navigator.getBattery().then(b => {
                    document.getElementById('ui-batt').innerText = "BATT: " + Math.round(b.level * 100) + "%";
                });
            }
        }
        setInterval(refreshStats, 1000); 
        refreshStats();

        // 2. Voice Recognition & Synthesis
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.lang = 'en-US';
        recognition.interimResults = false;

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.rate = 1.0;
            msg.pitch = 1.1;
            
            // Resume listening after speaking
            msg.onend = () => { if(isMaxActive) recognition.start(); };
            
            window.speechSynthesis.speak(msg);
            statusH.innerText = text;
        }

        // 3. Main Functionality
        function toggleMax() {
            if (!isMaxActive) {
                isMaxActive = true;
                trigger.classList.add('active');
                speak("Hello Sir, Robotic Core is Online. Max is ready.");
                logP.innerText = "System Active";
            } else {
                isMaxActive = false;
                trigger.classList.remove('active');
                recognition.stop();
                statusH.innerText = "CORE STANDBY";
                logP.innerText = "System in sleep mode, Sir.";
                speak("Going to standby mode, Sir.");
            }
        }

        recognition.onresult = (event) => {
            const cmd = event.results[0][0].transcript.toLowerCase();
            logP.innerText = "Command: " + cmd;
            handleCommand(cmd);
        };

        // Automatic restart if max is online
        recognition.onend = () => { 
            if(isMaxActive && !window.speechSynthesis.speaking) recognition.start(); 
        };

        function handleCommand(cmd) {
            // APP OPENING
            if (cmd.includes("youtube")) {
                speak("Opening YouTube, Sir.");
                window.open("https://www.youtube.com", "_blank");
            }
            else if (cmd.includes("google")) {
                speak("Opening Google Search, Sir.");
                window.open("https://www.google.com", "_blank");
            }
            else if (cmd.includes("whatsapp")) {
                speak("Opening WhatsApp, Sir.");
                window.location.href = "whatsapp://send";
            }
            // CONVERSATION
            else if (cmd.includes("hello") || cmd.includes("hi")) {
                speak("Hello Sir! How can I assist you today?");
            }
            else if (cmd.includes("who are you")) {
                speak("I am Max, your personal assistant, built by Aryan Sir.");
            }
            else if (cmd.includes("how are you")) {
                speak("I am functioning at full capacity, Sir. Thank you.");
            }
            else if (cmd.includes("time")) {
                speak("The current time is " + new Date().toLocaleTimeString() + ", Sir.");
            }
            else if (cmd.includes("battery")) {
                navigator.getBattery().then(b => {
                    speak("Sir, your battery level is " + Math.round(b.level * 100) + " percent.");
                });
            }
            else {
                speak("I heard " + cmd + ". Sir, I am not programmed for this action yet.");
            }
        }
    </script>
</body>
</html>
