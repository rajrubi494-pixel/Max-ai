<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max AI - Robotic Brain</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Rajdhani:wght@500&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: #000;
            background: radial-gradient(circle at center, #1a000d 0%, #000 100%);
            color: #fff; font-family: 'Rajdhani', sans-serif;
            height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden;
        }

        /* Top Header Stats */
        .stats-bar {
            position: absolute; top: 20px; width: 90%; display: flex; justify-content: space-between;
            font-family: 'Orbitron', sans-serif; font-size: 13px; color: #ff007f;
            text-shadow: 0 0 10px #ff007f; letter-spacing: 1px;
        }

        /* Robotic Heart UI */
        .heart-container { position: relative; width: 250px; height: 250px; display: flex; align-items: center; justify-content: center; }
        
        .robotic-heart {
            width: 130px; height: 130px; cursor: pointer; z-index: 10;
            filter: drop-shadow(0 0 15px #ff007f); transition: 0.4s;
        }
        .robotic-heart svg { width: 100%; height: 100%; fill: #ff007f; }

        /* Pulsing animation when Active */
        .active-core { animation: heartBeat 0.8s infinite alternate; filter: drop-shadow(0 0 40px #ff00ff); }
        @keyframes heartBeat { from { transform: scale(1); } to { transform: scale(1.15); } }

        /* Status & Conversations */
        .display-unit { margin-top: 30px; text-align: center; width: 90%; max-width: 400px; }
        
        #max-status { 
            font-size: 24px; color: #ff007f; text-shadow: 0 0 10px #ff007f; 
            font-family: 'Orbitron', sans-serif; min-height: 40px; margin-bottom: 10px;
        }
        
        #speech-output { 
            font-size: 16px; color: #ff99cc; background: rgba(255, 0, 127, 0.05);
            padding: 15px; border-radius: 10px; border: 1px solid rgba(255, 0, 127, 0.2);
            max-height: 150px; overflow-y: auto; display: none;
        }

        /* Branding */
        .footer { position: absolute; bottom: 25px; letter-spacing: 4px; font-size: 12px; color: rgba(255, 102, 178, 0.4); font-family: 'Orbitron', sans-serif; }
        .footer b { color: #ff007f; text-shadow: 0 0 5px #ff007f; }

        /* Visual Elements */
        .ring { position: absolute; border: 1px solid #ff007f; border-radius: 50%; opacity: 0.1; animation: rotate 10s linear infinite; }
        @keyframes rotate { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="stats-bar">
        <div id="time">TIME: --:--</div>
        <div id="battery">BATT: --%</div>
    </div>

    <div class="heart-container" onclick="toggleMax()">
        <div class="ring" style="width:200px; height:200px; border-style:dashed;"></div>
        <div class="ring" style="width:240px; height:240px; animation-direction: reverse;"></div>
        
        <div class="robotic-heart" id="heartIcon">
            <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35zM12 7.1V17.3c3.4-3.1 5.5-5.1 5.5-7.3 0-1.4-1.1-2.5-2.5-2.5-1.1 0-2.1.7-2.5 1.7h-1C10.1 7.8 9.1 7.1 8 7.1c-1.4 0-2.5 1.1-2.5 2.5 0 2.2 2.1 4.2 5.5 7.3V7.1z"/></svg>
        </div>
    </div>

    <div class="display-unit">
        <h1 id="max-status">CORE STANDBY</h1>
        <div id="speech-output"></div>
    </div>

    <div class="footer">BUILD BY <b>ARYAN</b></div>

    <script>
        const statusH1 = document.getElementById('max-status');
        const outputDiv = document.getElementById('speech-output');
        const heart = document.getElementById('heartIcon');
        
        let isListening = false;

        // 1. Time & Battery Logic
        function updateStats() {
            const now = new Date();
            document.getElementById('time').innerText = "TIME: " + now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            if (navigator.getBattery) {
                navigator.getBattery().then(bat => {
                    document.getElementById('battery').innerText = "BATT: " + Math.round(bat.level * 100) + "%";
                });
            }
        }
        setInterval(updateStats, 1000); updateStats();

        // 2. Speech Engine
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'en-US';
        recognition.interimResults = false;

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.rate = 1.0;
            msg.pitch = 1.1;
            
            outputDiv.style.display = "block";
            outputDiv.innerText = "Max: " + text;
            
            msg.onend = () => { if(isListening) recognition.start(); };
            window.speechSynthesis.speak(msg);
            statusH1.innerText = "Active";
        }

        function toggleMax() {
            if (!isListening) {
                isListening = true;
                heart.classList.add('active-core');
                speak("Hello Sir, Robotic Core is now online. Ask me anything.");
            } else {
                isListening = false;
                heart.classList.remove('active-core');
                recognition.stop();
                statusH1.innerText = "CORE STANDBY";
                outputDiv.style.display = "none";
                speak("Systems off. Goodbye Sir.");
            }
        }

        recognition.onresult = (event) => {
            const cmd = event.results[0][0].transcript.toLowerCase();
            processAI(cmd);
        };

        recognition.onend = () => { if(isListening && !window.speechSynthesis.speaking) recognition.start(); };

        // 3. INTERNAL BRAIN (No Redirects)
        async function processAI(query) {
            statusH1.innerText = "Thinking...";
            
            // Local Commands
            if (query.includes("youtube")) {
                speak("Launching YouTube for you, Sir.");
                window.open("https://www.youtube.com", "_blank");
            }
            else if (query.includes("whatsapp")) {
                speak("Opening WhatsApp, Sir.");
                window.location.href = "whatsapp://send";
            }
            else if (query.includes("light on") || query.includes("torch on")) {
                speak("Turning on the light, Sir.");
                toggleTorch(true);
            }
            else if (query.includes("light off") || query.includes("torch off")) {
                speak("Turning off the light, Sir.");
                toggleTorch(false);
            }
            // Smart Internal Conversation
            else if (query.includes("who are you") || query.includes("your name")) {
                speak("I am Max, a robotic AI created by Aryan Sir to provide intelligent information.");
            }
            else if (query.includes("hello") || query.includes("hi")) {
                speak("Hello Sir! I am here. Tell me, what's on your mind?");
            }
            // Internal Knowledge Fallback (Uses DuckDuckGo API for non-redirecting answers)
            else {
                try {
                    const response = await fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&no_html=1`);
                    const data = await response.json();
                    
                    if (data.AbstractText) {
                        speak(data.AbstractText);
                    } else if (data.RelatedTopics && data.RelatedTopics.length > 0) {
                        speak(data.RelatedTopics[0].Text);
                    } else {
                        speak("Sir, my data indicates this might be related to " + query + ", but I couldn't find a direct summary. Should I search deeper?");
                    }
                } catch (e) {
                    speak("Sir, I am unable to connect to my knowledge base right now, but I heard you said " + query);
                }
            }
        }

        async function toggleTorch(s) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({video: {facingMode: 'environment'}});
                const track = stream.getVideoTracks()[0];
                await track.applyConstraints({advanced: [{torch: s}]});
                if (!s) track.stop();
            } catch (e) { speak("Sir, camera permission is required for the flashlight."); }
        }
    </script>
</body>
</html>
