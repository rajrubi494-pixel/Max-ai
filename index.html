<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max AI Assistant</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #000; 
            background: radial-gradient(circle at center, #1a000d 0%, #000 100%); 
            color: #fff; font-family: 'Segoe UI', sans-serif; 
            height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden;
        }

        /* Pulsing Pink Orb UI */
        .max-orb {
            width: 150px; height: 150px; border-radius: 50%;
            background: radial-gradient(circle, #ff007f 0%, #33001a 100%);
            box-shadow: 0 0 40px #ff007f, inset 0 0 20px #fff;
            cursor: pointer; border: 2px solid #ff007f;
            display: flex; align-items: center; justify-content: center;
            transition: 0.3s; animation: pulse 2s infinite;
        }
        .max-orb:active { transform: scale(0.9); }
        .max-orb span { font-weight: bold; font-size: 18px; text-shadow: 0 0 10px #fff; letter-spacing: 1px; }

        @keyframes pulse {
            0% { box-shadow: 0 0 30px #ff007f; }
            50% { box-shadow: 0 0 70px #ff00ff; }
            100% { box-shadow: 0 0 30px #ff007f; }
        }

        /* Text Labels */
        #status { margin-top: 30px; font-size: 24px; color: #ff007f; text-shadow: 0 0 10px #ff007f; text-align: center; }
        #log { margin-top: 10px; color: #ff99cc; font-size: 16px; opacity: 0.7; font-style: italic; text-align: center; }

        .footer { position: absolute; bottom: 20px; font-size: 11px; color: rgba(255, 102, 178, 0.4); letter-spacing: 4px; }
        .footer b { color: #ff007f; }
    </style>
</head>
<body>

    <div class="max-orb" onclick="startMax()">
        <span>MAX AI</span>
    </div>

    <h1 id="status">TAP TO START</h1>
    <p id="log">Awaiting command, Sir...</p>

    <div class="footer">BUILD BY <b>ARYAN</b></div>

    <script>
        const statusH1 = document.getElementById('status');
        const logP = document.getElementById('log');

        // Voice Engine Setup
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'en-US';

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.rate = 1.0;
            msg.pitch = 1.1;
            window.speechSynthesis.speak(msg);
            statusH1.innerText = text;
        }

        function startMax() {
            try {
                recognition.start();
                statusH1.innerText = "Listening...";
                logP.innerText = "Listening to you, Sir.";
            } catch(e) { console.log("Mic busy"); }
        }

        recognition.onresult = (event) => {
            const cmd = event.results[0][0].transcript.toLowerCase();
            logP.innerText = "You said: " + cmd;
            handleCommand(cmd);
        };

        function handleCommand(cmd) {
            // APP COMMANDS
            if (cmd.includes("youtube")) {
                speak("Opening YouTube, Sir.");
                setTimeout(() => window.open("https://www.youtube.com", "_blank"), 1000);
            }
            else if (cmd.includes("google")) {
                speak("Opening Google, Sir.");
                setTimeout(() => window.open("https://www.google.com", "_blank"), 1000);
            }
            else if (cmd.includes("whatsapp")) {
                speak("Opening WhatsApp, Sir.");
                window.location.href = "whatsapp://send";
            }
            // CONVERSATION COMMANDS
            else if (cmd.includes("hello") || cmd.includes("hi")) {
                speak("Hello Sir! I am Max. How can I assist you today?");
            }
            else if (cmd.includes("who are you")) {
                speak("I am Max, your personal assistant, created by Aryan Sir.");
            }
            else if (cmd.includes("how are you")) {
                speak("I am functioning perfectly, Sir. Thank you for asking.");
            }
            else if (cmd.includes("time")) {
                speak("The current time is " + new Date().toLocaleTimeString() + ", Sir.");
            }
            // FALLBACK
            else {
                speak("I heard " + cmd + ". Sir, I am searching for this information.");
                setTimeout(() => window.open("https://www.google.com/search?q=" + cmd, "_blank"), 2000);
            }
        }
    </script>
</body>
</html>
