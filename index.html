<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max AI</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #000; 
            background: radial-gradient(circle, #1a000d, #000); 
            color: #fff; font-family: sans-serif; 
            height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden;
        }

        /* Stats bar */
        .stats { 
            position: absolute; top: 20px; width: 90%; display: flex; justify-content: space-between;
            color: #ff007f; font-weight: bold; font-size: 14px; text-shadow: 0 0 10px #ff007f;
        }

        /* Robotic Heart UI */
        .heart-container { position: relative; width: 200px; height: 200px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .heart-svg { width: 120px; fill: #ff007f; filter: drop-shadow(0 0 15px #ff007f); transition: 0.3s; }
        
        /* Heartbeat Animation when Active */
        .active .heart-svg { animation: pulse 0.8s infinite alternate; filter: drop-shadow(0 0 30px #ff00ff); }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.2); } }

        #status { margin-top: 30px; color: #ff007f; font-size: 24px; text-align: center; text-shadow: 0 0 10px #ff007f; }
        #output { margin-top: 10px; color: #ff99cc; font-size: 16px; opacity: 0.7; text-align: center; }

        .footer { position: absolute; bottom: 20px; color: rgba(255, 0, 127, 0.3); font-size: 12px; letter-spacing: 3px; }
    </style>
</head>
<body>

    <div class="stats">
        <div id="time-display">00:00</div>
        <div id="batt-display">BATT: --%</div>
    </div>

    <div class="heart-container" id="maxBtn" onclick="toggleMax()">
        <svg class="heart-svg" viewBox="0 0 24 24">
            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
        </svg>
    </div>

    <h1 id="status">CORE STANDBY</h1>
    <p id="output">Tap the heart to start, Sir.</p>

    <div class="footer">BUILD BY <b>ARYAN</b></div>

    <script>
        const statusH1 = document.getElementById('status');
        const outputP = document.getElementById('output');
        const heart = document.getElementById('maxBtn');

        let isOnline = false;

        // Battery & Time Logic
        function updateStats() {
            const d = new Date();
            document.getElementById('time-display').innerText = d.getHours().toString().padStart(2, '0') + ":" + d.getMinutes().toString().padStart(2, '0');
            
            if (navigator.getBattery) {
                navigator.getBattery().then(b => {
                    document.getElementById('batt-display').innerText = "BATT: " + Math.round(b.level * 100) + "%";
                });
            }
        }
        setInterval(updateStats, 1000); updateStats();

        // Voice Engine
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'en-US';
        recognition.interimResults = false;

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.rate = 1.0;
            msg.onend = () => { if(isOnline) recognition.start(); };
            window.speechSynthesis.speak(msg);
            statusH1.innerText = text;
        }

        function toggleMax() {
            if (!isOnline) {
                isOnline = true;
                heart.classList.add('active');
                speak("Hello Sir, Max is online. How can I help you?");
            } else {
                isOnline = false;
                heart.classList.remove('active');
                recognition.stop();
                statusH1.innerText = "CORE STANDBY";
                outputP.innerText = "System in sleep mode, Sir.";
            }
        }

        recognition.onresult = (event) => {
            const cmd = event.results[0][0].transcript.toLowerCase();
            outputP.innerText = "You: " + cmd;
            handleCommand(cmd);
        };

        recognition.onend = () => { if(isOnline && !window.speechSynthesis.speaking) recognition.start(); };

        function handleCommand(cmd) {
            // OPEN APPS
            if (cmd.includes("youtube")) {
                speak("Opening YouTube, Sir.");
                window.open("https://www.youtube.com", "_blank");
            }
            else if (cmd.includes("whatsapp")) {
                speak("Opening WhatsApp, Sir.");
                window.location.href = "whatsapp://send";
            }
            else if (cmd.includes("google")) {
                speak("Opening Google, Sir.");
                window.open("https://www.google.com", "_blank");
            }
            // CONVERSATION
            else if (cmd.includes("hello") || cmd.includes("hi")) {
                speak("Hello Sir! I am here and ready for your commands.");
            }
            else if (cmd.includes("who are you")) {
                speak("I am Max, your personal assistant, built by Aryan Sir.");
            }
            else if (cmd.includes("time")) {
                speak("The current time is " + new Date().toLocaleTimeString() + ", Sir.");
            }
            else if (cmd.includes("battery")) {
                navigator.getBattery().then(b => {
                    speak("Sir, the battery level is " + Math.round(b.level * 100) + " percent.");
                });
            }
            else {
                speak("I heard " + cmd + ". Sir, I am not programmed for this action yet.");
            }
        }
    </script>
</body>
</html>
