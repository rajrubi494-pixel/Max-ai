<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max AI - Sir Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: radial-gradient(circle at center, #1a000f 0%, #000 100%); 
            color: #fff; font-family: 'Rajdhani', sans-serif; 
            height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden;
        }
        .header { 
            position: absolute; top: 20px; width: 90%; display: flex; justify-content: space-between;
            font-family: 'Orbitron', sans-serif; font-size: 12px; color: #ff007f; text-shadow: 0 0 10px #ff007f;
        }
        .orb-container { position: relative; width: 250px; height: 250px; display: flex; align-items: center; justify-content: center; }
        .orb { 
            width: 150px; height: 150px; border-radius: 50%;
            background: radial-gradient(circle, #ff007f 0%, #33001a 100%);
            box-shadow: 0 0 40px #ff007f, inset 0 0 20px #fff;
            cursor: pointer; border: 2px solid #ff007f; z-index: 10; 
            display: flex; align-items: center; justify-content: center; transition: 0.2s;
        }
        .orb span { color: #fff; font-family: 'Orbitron', sans-serif; font-weight: bold; font-size: 16px; letter-spacing: 1px; text-shadow: 0 0 10px #ff007f; }
        .orb.listening { animation: fastPulse 0.6s infinite alternate; box-shadow: 0 0 80px #ff00ff; }
        @keyframes fastPulse { from { transform: scale(1); } to { transform: scale(1.1); } }
        #max-status { margin-top: 30px; font-size: 22px; color: #ff007f; text-shadow: 0 0 10px #ff007f; text-align: center; padding: 0 10px; }
        #user-speech { margin-top: 10px; color: #ff99cc; font-size: 16px; opacity: 0.7; }
        .footer { position: absolute; bottom: 20px; font-size: 11px; color: rgba(255, 102, 178, 0.4); font-family: 'Orbitron', sans-serif; }
    </style>
</head>
<body>

    <div class="header">
        <div id="time">TIME: --:--</div>
        <div id="batt">BATT: --%</div>
    </div>

    <div class="orb-container">
        <button class="orb" id="orbBtn" onclick="startMax()">
            <span>MAX AI</span>
        </button>
    </div>

    <h1 id="max-status">READY FOR YOUR COMMAND, SIR</h1>
    <p id="user-speech"></p>

    <div class="footer">BUILD BY <b>ARYAN</b></div>

    <script>
        const statusH1 = document.getElementById('max-status');
        const speechP = document.getElementById('user-speech');
        const orb = document.getElementById('orbBtn');

        // Refresh Stats
        function updateStats() {
            const d = new Date();
            document.getElementById('time').innerText = "TIME: " + d.getHours() + ":" + d.getMinutes().toString().padStart(2, '0');
            if (navigator.getBattery) {
                navigator.getBattery().then(b => {
                    document.getElementById('batt').innerText = "BATT: " + Math.round(b.level * 100) + "%";
                });
            }
        }
        setInterval(updateStats, 1000); updateStats();

        // Speech Recognition
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'en-US';
        recognition.interimResults = false;

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.rate = 1.0;
            window.speechSynthesis.speak(msg);
            statusH1.innerText = text;
        }

        function startMax() {
            try {
                recognition.start();
                orb.classList.add('listening');
                statusH1.innerText = "Listening, Sir...";
            } catch(e) { console.log("Busy"); }
        }

        recognition.onresult = (event) => {
            orb.classList.remove('listening');
            const cmd = event.results[0][0].transcript.toLowerCase();
            speechP.innerText = "You: " + cmd;
            handleCommand(cmd);
        };

        recognition.onerror = () => orb.classList.remove('listening');

        function handleCommand(cmd) {
            // APPS
            if (cmd.includes("youtube")) {
                speak("Opening YouTube, Sir.");
                window.open("https://www.youtube.com", "_blank");
            }
            else if (cmd.includes("whatsapp")) {
                speak("Opening WhatsApp, Sir.");
                window.location.href = "whatsapp://send";
            }
            // CALLING
            else if (cmd.includes("call")) {
                speak("Opening your dialer, Sir.");
                window.location.href = "tel:";
            }
            // FLASHLIGHT (TORCH)
            else if (cmd.includes("light on") || cmd.includes("torch on") || cmd.includes("flashlight on")) {
                speak("Turning on the light, Sir.");
                toggleTorch(true);
            }
            else if (cmd.includes("light off") || cmd.includes("torch off") || cmd.includes("flashlight off")) {
                speak("Turning off the light, Sir.");
                toggleTorch(false);
            }
            // GENERAL QUESTIONS (No Google Redirect)
            else if (cmd.includes("hello") || cmd.includes("hi")) {
                speak("Hello Sir! I am Max. How can I assist you today?");
            }
            else if (cmd.includes("who are you")) {
                speak("I am your personal AI assistant, built by Aryan Sir.");
            }
            else if (cmd.includes("time")) {
                speak("The current time is " + new Date().toLocaleTimeString() + ", Sir.");
            }
            else if (cmd.includes("how are you")) {
                speak("I am functioning perfectly, Sir. Thank you for asking.");
            }
            // SEARCH (Only if asked)
            else if (cmd.includes("search for")) {
                let query = cmd.replace("search for", "");
                speak("Searching Google for " + query + ", Sir.");
                window.open("https://www.google.com/search?q=" + query, "_blank");
            }
            // DEFAULT RESPONSE (Talks back instead of redirecting)
            else {
                speak("I heard you say: " + cmd + ". I am not sure how to perform that action, Sir.");
            }
        }

        let torchTrack;
        async function toggleTorch(state) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                torchTrack = stream.getVideoTracks()[0];
                const capabilities = torchTrack.getCapabilities();
                if (capabilities.torch) {
                    await torchTrack.applyConstraints({ advanced: [{ torch: state }] });
                    if (!state) {
                        torchTrack.stop();
                    }
                } else {
                    speak("Sorry Sir, your device does not support flashlight control through the browser.");
                }
            } catch (e) {
                speak("Sir, please allow camera permission to use the flashlight.");
            }
        }
    </script>
</body>
</html>
