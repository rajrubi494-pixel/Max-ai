<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max AI Assistant</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: #000; 
            background: radial-gradient(circle at center, #1a000f 0%, #000 100%); 
            color: #fff; font-family: 'Rajdhani', sans-serif; 
            height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden;
        }

        .header { 
            position: absolute; top: 20px; width: 90%; display: flex; justify-content: space-between;
            font-family: 'Orbitron', sans-serif; font-size: 12px; color: #ff007f; text-shadow: 0 0 10px #ff007f;
        }

        .orb-container { position: relative; width: 250px; height: 250px; display: flex; align-items: center; justify-content: center; }
        
        /* Stylish Pink Glowing Orb */
        .orb { 
            width: 150px; height: 150px; border-radius: 50%;
            background: radial-gradient(circle, #ff007f 0%, #33001a 100%);
            box-shadow: 0 0 40px #ff007f, inset 0 0 20px #fff;
            cursor: pointer; border: 2px solid #ff007f; z-index: 10; 
            display: flex; align-items: center; justify-content: center; transition: 0.3s;
        }

        .orb span { color: #fff; font-family: 'Orbitron', sans-serif; font-weight: bold; font-size: 16px; letter-spacing: 1px; text-shadow: 0 0 10px #ff007f; pointer-events: none; }

        /* Animation when Max is listening */
        .orb.listening { animation: fastPulse 0.6s infinite alternate; box-shadow: 0 0 80px #ff00ff; border-color: #fff; }

        @keyframes fastPulse { from { transform: scale(1); } to { transform: scale(1.1); } }

        #max-status { margin-top: 30px; font-size: 22px; color: #ff007f; text-shadow: 0 0 10px #ff007f; text-align: center; height: 35px; padding: 0 15px; }
        #user-speech { margin-top: 10px; color: #ff99cc; font-size: 16px; opacity: 0.7; font-style: italic; }

        .footer { position: absolute; bottom: 20px; font-size: 11px; color: rgba(255, 102, 178, 0.4); font-family: 'Orbitron', sans-serif; letter-spacing: 3px; }
        .footer b { color: #ff007f; }

        /* Background Visualizer Ring */
        .ring { position: absolute; width: 220px; height: 220px; border: 1px dashed #ff007f; border-radius: 50%; opacity: 0.2; animation: rotateRing 10s linear infinite; }
        @keyframes rotateRing { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="header">
        <div id="time">TIME: --:--</div>
        <div id="batt">BATT: --%</div>
    </div>

    <div class="orb-container">
        <div class="ring"></div>
        <button class="orb" id="orbBtn" onclick="startMax()">
            <span>MAX AI</span>
        </button>
    </div>

    <h1 id="max-status">AWAITING COMMAND, SIR</h1>
    <p id="user-speech"></p>

    <div class="footer">BUILD BY <b>ARYAN</b></div>

    <script>
        const statusH1 = document.getElementById('max-status');
        const speechP = document.getElementById('user-speech');
        const orb = document.getElementById('orbBtn');

        // Stats: Time and Battery
        function updateStats() {
            const d = new Date();
            document.getElementById('time').innerText = "TIME: " + d.getHours().toString().padStart(2, '0') + ":" + d.getMinutes().toString().padStart(2, '0');
            if (navigator.getBattery) {
                navigator.getBattery().then(b => {
                    document.getElementById('batt').innerText = "BATT: " + Math.round(b.level * 100) + "%";
                });
            }
        }
        setInterval(updateStats, 1000); 
        updateStats();

        // Speech Engine
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'en-US';
        recognition.interimResults = false;

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.rate = 1.0;
            msg.pitch = 1.1;
            window.speechSynthesis.speak(msg);
            statusH1.innerText = text;
        }

        function startMax() {
            try {
                recognition.start();
                orb.classList.add('listening');
                statusH1.innerText = "Listening, Sir...";
            } catch(e) { console.log("Restarting..."); }
        }

        recognition.onresult = (event) => {
            orb.classList.remove('listening');
            const cmd = event.results[0][0].transcript.toLowerCase();
            speechP.innerText = "You said: " + cmd;
            handleCommand(cmd);
        };

        recognition.onerror = () => orb.classList.remove('listening');

        function handleCommand(cmd) {
            // 1. OPEN APPS
            if (cmd.includes("youtube")) {
                speak("Opening YouTube, Sir.");
                setTimeout(() => { window.open("https://www.youtube.com", "_blank"); }, 1000);
            }
            else if (cmd.includes("whatsapp")) {
                speak("Opening WhatsApp, Sir.");
                setTimeout(() => { window.location.href = "whatsapp://send"; }, 1000);
            }
            else if (cmd.includes("facebook")) {
                speak("Opening Facebook, Sir.");
                setTimeout(() => { window.open("https://www.facebook.com", "_blank"); }, 1000);
            }
            // 2. PHONE CALL
            else if (cmd.includes("call")) {
                speak("Opening your phone dialer, Sir.");
                window.location.href = "tel:";
            }
            // 3. FLASHLIGHT
            else if (cmd.includes("light on") || cmd.includes("torch on") || cmd.includes("flashlight on")) {
                speak("Turning the flashlight on, Sir.");
                toggleTorch(true);
            }
            else if (cmd.includes("light off") || cmd.includes("torch off") || cmd.includes("flashlight off")) {
                speak("Turning the flashlight off, Sir.");
                toggleTorch(false);
            }
            // 4. CHAT / QUESTIONS
            else if (cmd.includes("hello") || cmd.includes("hi max")) {
                speak("Hello Sir! How can I help you today?");
            }
            else if (cmd.includes("who are you")) {
                speak("I am Max, your personal assistant, built by Aryan Sir.");
            }
            else if (cmd.includes("time")) {
                speak("The current time is " + new Date().toLocaleTimeString() + ", Sir.");
            }
            // 5. GOOGLE SEARCH (Explicit Only)
            else if (cmd.includes("search for")) {
                let query = cmd.split("search for")[1];
                speak("Searching the web for " + query + ", Sir.");
                window.open("https://www.google.com/search?q=" + query, "_blank");
            }
            // 6. DIRECT RESPONSE (No Redirect)
            else {
                speak("I heard you say " + cmd + ". Sir, I am not programmed for this action yet.");
            }
        }

        // Torch Functionality
        let torchTrack;
        async function toggleTorch(state) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                torchTrack = stream.getVideoTracks()[0];
                await torchTrack.applyConstraints({ advanced: [{ torch: state }] });
                if (!state) { torchTrack.stop(); }
            } catch (e) {
                speak("Sir, please allow camera permission for the light.");
            }
        }
    </script>
</body>
</html>
