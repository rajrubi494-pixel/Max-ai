<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max AI Assistant</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .siri-orb { width: 150px; height: 150px; background: radial-gradient(circle, #00d2ff, #3a7bd5, #000); border-radius: 50%; box-shadow: 0 0 50px #3a7bd5; cursor: pointer; transition: 0.3s; border: none; outline: none; }
        .siri-orb:active { transform: scale(0.9); box-shadow: 0 0 80px #00d2ff; }
        #status { margin-top: 20px; font-size: 1.2rem; color: #aaa; text-align: center; padding: 0 20px; min-height: 50px; }
        .instruction { position: absolute; bottom: 30px; font-size: 0.8rem; color: #555; text-align: center; }
    </style>
</head>
<body>

    <button class="siri-orb" onclick="startMax()"></button>
    <div id="status">Tap the orb to speak with Max</div>
    <div class="instruction">Speak: "Turn on light", "Call someone", "Open WhatsApp"</div>

    <script>
        const statusDiv = document.getElementById('status');
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'en-US';
        recognition.continuous = false;

        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            window.speechSynthesis.speak(utterance);
            statusDiv.innerText = "Max: " + text;
        }

        function startMax() {
            try {
                recognition.start();
                statusDiv.innerText = "Listening...";
            } catch (e) {
                console.log("Already listening");
            }
        }

        recognition.onresult = async (event) => {
            const command = event.results[0][0].transcript.toLowerCase();
            statusDiv.innerText = "You said: " + command;
            handleCommand(command);
        };

        async function handleCommand(cmd) {
            // 1. LIGHT CONTROL
            if (cmd.includes("light on") || cmd.includes("torch on")) {
                toggleTorch(true);
                speak("Sure, turning the light on.");
            } 
            else if (cmd.includes("light off") || cmd.includes("torch off")) {
                toggleTorch(false);
                speak("Okay, turning the light off.");
            }
            // 2. PHONE CALLS
            else if (cmd.includes("call")) {
                speak("Choose a contact to call.");
                getContactAndCall();
            }
            // 3. OPEN APPS
            else if (cmd.includes("open whatsapp")) {
                speak("Opening WhatsApp");
                window.location.href = "whatsapp://send";
            }
            else if (cmd.includes("open instagram")) {
                speak("Opening Instagram");
                window.location.href = "instagram://app";
            }
            else if (cmd.includes("open youtube")) {
                speak("Opening YouTube");
                window.location.href = "youtube://";
            }
            else {
                speak("I'm not sure how to " + cmd + " yet.");
            }
        }

        let track;
        async function toggleTorch(state) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                track = stream.getVideoTracks()[0];
                await track.applyConstraints({ advanced: [{ torch: state }] });
                if (!state) {
                    track.stop();
                }
            } catch (e) { 
                speak("I need camera permission for the flashlight."); 
            }
        }

        async function getContactAndCall() {
            if ('contacts' in navigator) {
                try {
                    const contacts = await navigator.contacts.select(['name', 'tel'], { multiple: false });
                    if (contacts.length) window.location.href = `tel:${contacts[0].tel[0]}`;
                } catch (e) { speak("Could not access contacts."); }
            } else {
                speak("Your browser doesn't support contact picking. Try Chrome on Android.");
            }
        }
    </script>
</body>
</html>
