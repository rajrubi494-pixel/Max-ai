<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max AI - Robotic Heart</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500&display=swap');
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: #000; 
            background: radial-gradient(circle at center, #1a000d 0%, #000 100%); 
            color: #fff; font-family: 'Rajdhani', sans-serif; 
            height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden;
        }

        /* Stats Bar */
        .header { 
            position: absolute; top: 20px; width: 90%; display: flex; justify-content: space-between;
            font-family: 'Orbitron', sans-serif; font-size: 11px; color: #ff007f; text-shadow: 0 0 8px #ff007f;
        }

        /* Robotic Heart UI */
        .core-container { position: relative; width: 260px; height: 260px; display: flex; align-items: center; justify-content: center; }
        
        .robotic-heart {
            width: 140px; height: 140px; cursor: pointer; transition: 0.4s; z-index: 10;
            filter: drop-shadow(0 0 15px #ff007f);
        }

        .robotic-heart svg { width: 100%; height: 100%; fill: #ff007f; transition: 0.3s; }

        /* Pulsing Animation when Online */
        .online-active { animation: heartBeat 0.8s infinite alternate; filter: drop-shadow(0 0 40px #ff00ff); }

        @keyframes heartBeat {
            from { transform: scale(1); }
            to { transform: scale(1.15); }
        }

        /* Info Labels */
        #max-status { margin-top: 35px; font-size: 24px; color: #ff007f; text-shadow: 0 0 10px #ff007f; text-align: center; font-family: 'Orbitron', sans-serif; min-height: 35px; }
        #speech-log { margin-top: 10px; color: #ff99cc; font-size: 16px; opacity: 0.6; min-height: 20px; text-align: center; font-style: italic; }
        #timer-display { margin-top: 8px; font-size: 12px; color: #444; font-family: 'Orbitron', sans-serif; letter-spacing: 2px; }

        .footer { position: absolute; bottom: 25px; font-size: 11px; color: rgba(255, 102, 178, 0.4); font-family: 'Orbitron', sans-serif; letter-spacing: 5px; }
        .footer b { color: #ff007f; text-shadow: 0 0 5px #ff007f; }

        /* Animated Rings */
        .ring { position: absolute; border: 1px solid #ff007f; border-radius: 50%; opacity: 0.15; animation: spin 12s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="header">
        <div id="time-ui">TIME: --:--</div>
        <div id="batt-ui">BATT: --%</div>
    </div>

    <div class="core-container" id="mainTrigger" onclick="startCore()">
        <div class="ring" style="width:220px; height:220px; border-style: dashed;"></div>
        <div class="ring" style="width:250px; height:250px; animation-direction: reverse;"></div>
        
        <div class="robotic-heart" id="heartIcon">
            <svg viewBox="0 0 24 24">
                <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35zM12 7.1V17.3c3.4-3.1 5.5-5.1 5.5-7.3 0-1.4-1.1-2.5-2.5-2.5-1.1 0-2.1.7-2.5 1.7h-1C10.1 7.8 9.1 7.1 8 7.1c-1.4 0-2.5 1.1-2.5 2.5 0 2.2 2.1 4.2 5.5 7.3V7.1z"/>
            </svg>
        </div>
    </div>

    <h1 id="max-status">CORE STANDBY</h1>
    <p id="speech-log"></p>
    <div id="timer-display"></div>

    <div class="footer">BUILD BY <b>ARYAN</b></div>

    <script>
        const statusTxt = document.getElementById('max-status');
        const logTxt = document.getElementById('speech-log');
        const heart = document.getElementById('heartIcon');
        const timerTxt = document.getElementById('timer-display');

        let isCoreActive = false;
        let countdown;
        let secondsLeft = 120;

        // Stats Logic
        function updateUI() {
            const now = new Date();
            document.getElementById('time-ui').innerText = "TIME: " + now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            if (navigator.getBattery) {
                navigator.getBattery().then(b => {
                    document.getElementById('batt-ui').innerText = "BATT: " + Math.round(b.level * 100) + "%";
                });
            }
        }
        setInterval(updateUI, 1000); updateUI();

        // Voice Logic
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'en-US';
        recognition.continuous = false;

        function speak(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 1.0;
            utterance.pitch = 1.1;
            
            utterance.onstart = () => { recognition.stop(); };
            utterance.onend = () => { if(isCoreActive) startListening(); };
            
            window.speechSynthesis.speak(utterance);
            statusTxt.innerText = text;
        }

        function startCore() {
            if (!isCoreActive) {
                isCoreActive = true;
                heart.classList.add('online-active');
                speak("Robotic Core Online. Hello Sir, Max is ready to assist you.");
                resetTimer();
            } else {
                stopCore();
            }
        }

        function stopCore() {
            isCoreActive = false;
            heart.classList.remove('online-active');
            recognition.stop();
            statusTxt.innerText = "CORE STANDBY";
            logTxt.innerText = "";
            timerTxt.innerText = "";
            clearInterval(countdown);
            speak("System entering standby mode, Sir.");
        }

        function startListening() {
            if(!isCoreActive) return;
            try {
                recognition.start();
                statusTxt.innerText = "Listening, Sir...";
            } catch(e) {}
        }

        recognition.onresult = (event) => {
            const cmd = event.results[0][0].transcript.toLowerCase();
            logTxt.innerText = "Query: " + cmd;
            resetTimer();
            handleAI(cmd);
        };

        recognition.onend = () => { 
            if(isCoreActive && !window.speechSynthesis.speaking) recognition.start(); 
        };

        function resetTimer() {
            clearInterval(countdown);
            secondsLeft = 120;
            countdown = setInterval(() => {
                secondsLeft--;
                timerTxt.innerText = "AUTO-OFF IN: " + secondsLeft + "s";
                if(secondsLeft <= 0) stopCore();
            }, 1000);
        }

        async function handleAI(cmd) {
            // Commands
            if (cmd.includes("light on") || cmd.includes("torch on")) {
                speak("Activating flashlight, Sir.");
                controlTorch(true);
            }
            else if (cmd.includes("light off") || cmd.includes("torch off")) {
                speak("Deactivating flashlight, Sir.");
                controlTorch(false);
            }
            else if (cmd.includes("youtube")) {
                speak("Accessing YouTube, Sir.");
                window.open("https://www.youtube.com", "_blank");
            }
            else if (cmd.includes("whatsapp")) {
                speak("Opening WhatsApp messenger, Sir.");
                window.location.href = "whatsapp://send";
            }
            else if (cmd.includes("call")) {
                speak("Launching dialer, Sir.");
                window.location.href = "tel:";
            }
            else if (cmd.includes("hello") || cmd.includes("hi max")) {
                speak("Hello Sir! My systems are fully operational. I am ready for your questions.");
            }
            else if (cmd.includes("who are you")) {
                speak("I am Max, an advanced robotic AI created by Aryan Sir to provide information and control device features.");
            }
            else if (cmd.includes("time")) {
                speak("Sir, the current time is " + new Date().toLocaleTimeString());
            }
            // Smart Conversation Fallback
            else {
                speak("Exploring database for your query about " + cmd + ". Searching the worldwide web now, Sir.");
                setTimeout(() => {
                    window.open("https://www.google.com/search?q=" + encodeURIComponent(cmd), "_blank");
                }, 2000);
            }
        }

        async function controlTorch(state) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({video: {facingMode: 'environment'}});
                const track = stream.getVideoTracks()[0];
                await track.applyConstraints({advanced: [{torch: state}]});
                if (!state) track.stop();
            } catch (e) { speak("Sir, I need camera permission to manage the flashlight."); }
        }
    </script>
</body>
  </html>
