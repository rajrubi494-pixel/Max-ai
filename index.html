<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max AI - Music Assistant</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #000; background: radial-gradient(circle, #1a000d, #000); 
            color: #fff; font-family: sans-serif; height: 100vh; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden;
        }
        .header { position: absolute; top: 15px; width: 90%; display: flex; justify-content: space-between; color: #ff007f; font-weight: bold; font-size: 12px; }
        
        /* Heart UI */
        .heart-box { position: relative; width: 180px; height: 180px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .heart-svg { width: 100px; fill: #ff007f; filter: drop-shadow(0 0 15px #ff007f); transition: 0.3s; }
        .active .heart-svg { animation: beat 0.8s infinite alternate; filter: drop-shadow(0 0 30px #ff00ff); }
        @keyframes beat { to { transform: scale(1.2); } }

        #max-status { margin-top: 25px; color: #ff007f; font-size: 22px; text-align: center; text-shadow: 0 0 10px #ff007f; height: 30px; }
        #user-speech { margin-top: 10px; color: #ff99cc; font-size: 15px; opacity: 0.7; }

        /* Hidden Music Player */
        #player-container { margin-top: 20px; width: 300px; height: 180px; border: 1px solid #ff007f; border-radius: 10px; display: none; overflow: hidden; background: #000; }
        
        .footer { position: absolute; bottom: 15px; color: rgba(255,0,127,0.3); font-size: 10px; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="header">
        <div id="tm">--:--</div>
        <div id="bt">BATT: --%</div>
    </div>

    <div class="heart-box" id="mainCore" onclick="startMax()">
        <svg class="heart-svg" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
    </div>

    <h1 id="max-status">CORE STANDBY</h1>
    <p id="user-speech">Tap to activate Max</p>

    <!-- YouTube Music Iframe -->
    <div id="player-container">
        <iframe id="yt-player" width="100%" height="100%" src="" frameborder="0" allow="autoplay"></iframe>
    </div>

    <div class="footer">BUILD BY <b>ARYAN</b></div>

    <script>
        const statusH1 = document.getElementById('max-status');
        const speechP = document.getElementById('user-speech');
        const core = document.getElementById('mainCore');
        const ytPlayer = document.getElementById('yt-player');
        const playerCont = document.getElementById('player-container');

        let active = false;

        // Battery & Time
        function updateStats() {
            const d = new Date();
            document.getElementById('tm').innerText = d.getHours() + ":" + d.getMinutes().toString().padStart(2, '0');
            if (navigator.getBattery) navigator.getBattery().then(b => {
                document.getElementById('bt').innerText = "BATT: " + Math.round(b.level * 100) + "%";
            });
        }
        setInterval(updateStats, 1000); updateStats();

        // Speech Engine
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'en-US';
        recognition.continuous = false;

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.onend = () => { if(active) recognition.start(); };
            window.speechSynthesis.speak(msg);
            statusH1.innerText = text;
        }

        function startMax() {
            if(!active) {
                active = true;
                core.classList.add('active');
                speak("Max Online. How can I help you, Sir?");
            } else {
                active = false;
                core.classList.remove('active');
                recognition.stop();
                statusH1.innerText = "CORE STANDBY";
                speechP.innerText = "Tap to activate Max";
                stopMusic();
            }
        }

        recognition.onresult = (e) => {
            const cmd = e.results[0][0].transcript.toLowerCase();
            speechP.innerText = "Query: " + cmd;
            handleCommand(cmd);
        };

        recognition.onend = () => { if(active && !window.speechSynthesis.speaking) recognition.start(); };

        function handleCommand(cmd) {
            // MUSIC COMMAND
            if (cmd.includes("play")) {
                let song = cmd.replace("play", "").trim();
                speak("Playing " + song + ", Sir.");
                playMusic(song);
            }
            else if (cmd.includes("stop") || cmd.includes("pause")) {
                speak("Stopping music, Sir.");
                stopMusic();
            }
            // UTILITIES
            else if (cmd.includes("light on")) { speak("Torch on, Sir."); toggleL(true); }
            else if (cmd.includes("light off")) { speak("Torch off, Sir."); toggleL(false); }
            // CHAT
            else if (cmd.includes("hello") || cmd.includes("hi")) speak("Hello Sir! Ready for your commands.");
            else if (cmd.includes("who are you")) speak("I am Max, your AI assistant, built by Aryan Sir.");
            else if (cmd.includes("how are you")) speak("I am functioning perfectly, Sir.");
            else {
                speak("I heard " + cmd + ". Sir, I am searching for more info.");
                setTimeout(() => window.open("https://google.com/search?q=" + cmd), 2000);
            }
        }

        function playMusic(song) {
            playerCont.style.display = "block";
            // Searching YouTube via DuckDuckGo redirect to find video ID
            const searchQuery = encodeURIComponent(song + " song");
            ytPlayer.src = `https://www.youtube.com/embed?listType=search&list=${searchQuery}&autoplay=1`;
        }

        function stopMusic() {
            playerCont.style.display = "none";
            ytPlayer.src = "";
        }

        async function toggleL(s) {
            try {
                const st = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
                const tk = st.getVideoTracks()[0];
                await tk.applyConstraints({advanced:[{torch:s}]});
                if(!s) tk.stop();
            } catch(e) { speak("Sir, camera permission is needed."); }
        }
    </script>
</body>
</html>
