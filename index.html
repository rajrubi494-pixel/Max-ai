<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max AI - Fast Pink</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: radial-gradient(circle at center, #1a000f 0%, #000 100%); 
            color: #fff; font-family: 'Rajdhani', sans-serif; 
            height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden;
        }

        .header { 
            position: absolute; top: 20px; width: 90%; display: flex; justify-content: space-between;
            font-family: 'Orbitron', sans-serif; font-size: 12px; color: #ff007f; 
            text-shadow: 0 0 10px #ff007f;
        }

        .orb-container { position: relative; width: 250px; height: 250px; display: flex; align-items: center; justify-content: center; }
        
        .orb { 
            width: 150px; height: 150px; border-radius: 50%;
            background: radial-gradient(circle, #ff007f 0%, #33001a 100%);
            box-shadow: 0 0 40px #ff007f, inset 0 0 20px #fff;
            cursor: pointer; border: 2px solid #ff007f; z-index: 10; 
            display: flex; align-items: center; justify-content: center;
            transition: 0.2s;
        }

        .orb span {
            color: #fff; font-family: 'Orbitron', sans-serif; font-weight: bold; font-size: 16px; 
            letter-spacing: 1px; text-shadow: 0 0 10px #ff007f; pointer-events: none;
        }

        .orb:active { transform: scale(0.9); }
        .orb.listening { animation: fastPulse 0.6s infinite alternate; box-shadow: 0 0 80px #ff00ff; }

        @keyframes fastPulse {
            from { transform: scale(1); opacity: 1; }
            to { transform: scale(1.1); opacity: 0.8; }
        }

        #max-status { margin-top: 30px; font-size: 24px; color: #ff007f; text-shadow: 0 0 10px #ff007f; height: 30px; text-align: center; }
        #user-speech { margin-top: 10px; color: #ff99cc; font-size: 16px; opacity: 0.7; height: 20px; }

        .footer { position: absolute; bottom: 20px; letter-spacing: 4px; font-size: 11px; color: rgba(255, 102, 178, 0.4); font-family: 'Orbitron', sans-serif; }
        .footer b { color: #ff007f; }

        .ring {
            position: absolute; width: 220px; height: 220px; border: 1px solid #ff007f;
            border-radius: 50%; opacity: 0.3; animation: rot 4s linear infinite;
        }
        @keyframes rot { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="header">
        <div id="time">TIME: --:--</div>
        <div id="batt">BATT: --%</div>
    </div>

    <div class="orb-container">
        <div class="ring"></div>
        <button class="orb" id="orbBtn" onclick="startFastMax()">
            <span>MAX AI</span>
        </button>
    </div>

    <h1 id="max-status">READY SIR</h1>
    <p id="user-speech"></p>

    <div class="footer">BUILD BY <b>ARYAN</b></div>

    <script>
        const statusH1 = document.getElementById('max-status');
        const speechP = document.getElementById('user-speech');
        const orb = document.getElementById('orbBtn');

        // Stats Refresh
        function updateStats() {
            const d = new Date();
            document.getElementById('time').innerText = "TIME: " + d.getHours() + ":" + d.getMinutes().toString().padStart(2, '0');
            if (navigator.getBattery) {
                navigator.getBattery().then(b => {
                    document.getElementById('batt').innerText = "BATT: " + Math.round(b.level * 100) + "%";
                });
            }
        }
        setInterval(updateStats, 1000); updateStats();

        // Speech Engine
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'en-US';
        recognition.continuous = false;
        recognition.interimResults = false;

        function speak(text) {
            window.speechSynthesis.cancel(); 
            const msg = new SpeechSynthesisUtterance(text);
            msg.rate = 1.1; // Faster talking
            window.speechSynthesis.speak(msg);
            statusH1.innerText = text;
        }

        function startFastMax() {
            window.speechSynthesis.cancel();
            try {
                recognition.start();
                orb.classList.add('listening');
                statusH1.innerText = "Listening...";
            } catch(e) {}
        }

        recognition.onresult = (event) => {
            orb.classList.remove('listening');
            const cmd = event.results[0][0].transcript.toLowerCase();
            speechP.innerText = cmd;
            handleCommand(cmd);
        };

        recognition.onspeechend = () => {
            recognition.stop();
            orb.classList.remove('listening');
        };

        function handleCommand(cmd) {
            // Speed logic: No delay
            if (cmd.includes("youtube")) {
                speak("Opening YouTube, Sir.");
                window.location.href = "https://www.youtube.com";
            }
            else if (cmd.includes("whatsapp")) {
                speak("Opening WhatsApp, Sir.");
                window.location.href = "whatsapp://send";
            }
            else if (cmd.includes("light on") || cmd.includes("torch on")) {
                speak("Light on, Sir.");
                toggleTorch(true);
            }
            else if (cmd.includes("light off") || cmd.includes("torch off")) {
                speak("Light off, Sir.");
                toggleTorch(false);
            }
            else if (cmd.includes("hello") || cmd.includes("hi")) {
                speak("Hello Sir! How can I help you today?");
            }
            else if (cmd.includes("who are you")) {
                speak("I am Max AI, built by Aryan Sir.");
            }
            else if (cmd.includes("time")) {
                speak("It is " + new Date().toLocaleTimeString() + ", Sir.");
            }
            else {
                speak("Searching the internet for you, Sir.");
                window.open("https://www.google.com/search?q=" + encodeURIComponent(cmd), "_blank");
            }
        }

        async function toggleTorch(s) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({video: {facingMode: 'environment'}});
                const track = stream.getVideoTracks()[0];
                await track.applyConstraints({advanced: [{torch: s}]});
                if (!s) track.stop();
            } catch (e) { speak("I need permission, Sir."); }
        }
    </script>
</body>
</html>
