<!DOCTYPE html>
<html>
<head>
    <title>Max AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: black; color: white; text-align: center; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .orb { width: 120px; height: 120px; background: cyan; border-radius: 50%; box-shadow: 0 0 30px cyan; cursor: pointer; border: none; }
    </style>
</head>
<body>
    <button class="orb" onclick="startMax()"></button>
    <h2 id="st">Tap the circle to talk to Max</h2>
    <script>
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        function startMax() {
            recognition.start();
            document.getElementById('st').innerText = "Listening...";
        }
        recognition.onresult = (e) => {
            const cmd = e.results[0][0].transcript.toLowerCase();
            document.getElementById('st').innerText = "You: " + cmd;
            if(cmd.includes("whatsapp")) window.location.href = "whatsapp://send";
            else if(cmd.includes("light on")) toggle(true);
            else if(cmd.includes("light off")) toggle(false);
            else {
                const s = new SpeechSynthesisUtterance("I heard " + cmd);
                window.speechSynthesis.speak(s);
            }
        };
        async function toggle(s) {
            const stream = await navigator.mediaDevices.getUserMedia({video: {facingMode: 'environment'}});
            const track = stream.getVideoTracks()[0];
            await track.applyConstraints({advanced: [{torch: s}]});
        }
    </script>
</body>
</html>
