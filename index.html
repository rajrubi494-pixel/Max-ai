<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max AI - Robotics Core</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500&display=swap');
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #000; background: radial-gradient(circle at center, #200010 0%, #000 100%); 
            color: #fff; font-family: 'Rajdhani', sans-serif; 
            height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden;
        }

        /* Header Stats */
        .header { 
            position: absolute; top: 20px; width: 90%; display: flex; justify-content: space-between;
            font-family: 'Orbitron', sans-serif; font-size: 11px; color: #ff007f; text-shadow: 0 0 10px #ff007f;
        }

        /* Robotic Heart UI */
        .heart-box { position: relative; width: 300px; height: 300px; display: flex; align-items: center; justify-content: center; }
        
        .robotic-heart {
            width: 160px; height: 160px; cursor: pointer; transition: 0.5s; z-index: 10;
            filter: drop-shadow(0 0 20px #ff007f);
        }

        .robotic-heart svg { width: 100%; height: 100%; fill: #ff007f; }

        /* Pulse Animation when Online */
        .online-pulse { animation: heartBeat 0.8s infinite alternate; filter: drop-shadow(0 0 40px #ff007f); }

        @keyframes heartBeat {
            from { transform: scale(1); filter: drop-shadow(0 0 20px #ff007f); }
            to { transform: scale(1.1); filter: drop-shadow(0 0 50px #ff00ff); }
        }

        /* Information Text */
        #max-status { margin-top: 30px; font-size: 24px; color: #ff007f; text-shadow: 0 0 10px #ff007f; text-align: center; height: 35px; width: 90%; }
        #user-speech { margin-top: 10px; color: #ff99cc; font-size: 16px; opacity: 0.6; min-height: 20px; text-align: center; }
        #timer-text { margin-top: 5px; font-size: 12px; color: #555; font-family: 'Orbitron', sans-serif; }

        .footer { position: absolute; bottom: 20px; font-size: 11px; color: rgba(255, 102, 178, 0.3); font-family: 'Orbitron', sans-serif; letter-spacing: 4px; }
        .footer b { color: #ff007f; }

        /* Outer Rings */
        .ring { position: absolute; border: 2px solid #ff007f; border-radius: 50%; opacity: 0.1; animation: rotate 10s linear infinite; }
        @keyframes rotate { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="header">
        <div id="time">TIME: --:--</div>
        <div id="batt">BATT: --%</div>
    </div>

    <div class="heart-box">
        <div class="ring" style="width:240px; height:240px; border-style:dashed;"></div>
        <div class="ring" style="width:280px; height:280px; border-width:1px; animation-duration:15s; animation-direction:reverse;"></div>
        
        <div class="robotic-heart" id="maxBtn" onclick="toggleMax()">
            <!-- Robotic Heart SVG Icon -->
            <svg viewBox="0 0 24 24">
                <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35zM12 6.4V18.1c3.96-3.58 6.5-5.87 6.5-8.5 0-1.66-1.34-3-3-3-1.21 0-2.38.79-2.79 1.88h-1.42C10.88 7.42 9.71 6.63 8.5 6.63c-1.66 0-3 1.34-3 3 0 2.63 2.54 4.92 6.5 8.5V6.4z"/>
            </svg>
        </div>
    </div>

    <h1 id="max-status">MAX STANDBY</h1>
    <p id="user-speech"></p>
    <div id="timer-text"></div>

    <div class="footer">BUILD BY <b>ARYAN</b></div>

    <script>
        const statusH1 = document.getElementById('max-status');
        const speechP = document.getElementById('user-speech');
        const heart = document.getElementById('maxBtn');
        const timerDiv = document.getElementById('timer-text');

        let isOnline = false;
        let sleepTimer;
        let timeLeft = 120; // 2 minutes

        // Stats
        function updateStats() {
            const d = new Date();
            document.getElementById('time').innerText = "TIME: " + d.getHours().toString().padStart(2, '0') + ":" + d.getMinutes().toString().padStart(2, '0');
            if (navigator.getBattery) {
                navigator.getBattery().then(b => {
                    document.getElementById('batt').innerText = "BATT: " + Math.round(b.level * 100) + "%";
                });
            }
        }
        setInterval(updateStats, 1000); updateStats();

        // AI Speech Engine
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'en-US';
        recognition.interimResults = false;

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.onstart = () => recognition.stop();
            msg.onend = () => { if(isOnline) startListening(); };
            window.speechSynthesis.speak(msg);
            statusH1.innerText = text;
        }

        function toggleMax() {
            if (!isOnline) {
                isOnline = true;
                heart.classList.add('online-pulse');
                speak("Max Online. Hello Sir, how can I help you?");
                startListening();
                resetSleepTimer();
            } else {
                stopMax();
            }
        }

        function stopMax() {
            isOnline = false;
            heart.classList.remove('online-pulse');
            recognition.stop();
            statusH1.innerText = "MAX STANDBY";
            speechP.innerText = "";
            timerDiv.innerText = "";
            clearInterval(sleepTimer);
            speak("Going to sleep mode, Sir.");
        }

        function startListening() {
            if(!isOnline) return;
            try {
                recognition.start();
                statusH1.innerText = "Listening, Sir...";
            } catch(e) {}
        }

        recognition.onresult = (event) => {
            const cmd = event.results[0][0].transcript.toLowerCase();
            speechP.innerText = "You: " + cmd;
            resetSleepTimer(); // Activity detected, reset timer
            handleCommand(cmd);
        };

        recognition.onend = () => { if(isOnline) recognition.start(); };

        function resetSleepTimer() {
            clearInterval(sleepTimer);
            timeLeft = 120;
            sleepTimer = setInterval(() => {
                timeLeft--;
                timerDiv.innerText = "STANDBY IN: " + timeLeft + "s";
                if (timeLeft <= 0) {
                    stopMax();
                }
            }, 1000);
        }

        async function handleCommand(cmd) {
            // HARDWARE
            if (cmd.includes("light on") || cmd.includes("torch on")) {
                speak("Turning flashlight on, Sir.");
                toggleTorch(true);
            }
            else if (cmd.includes("light off") || cmd.includes("torch off")) {
                speak("Turning flashlight off, Sir.");
                toggleTorch(false);
            }
            // APPS
            else if (cmd.includes("youtube")) {
                speak("Opening YouTube, Sir.");
                window.open("https://www.youtube.com", "_blank");
            }
            else if (cmd.includes("whatsapp")) {
                speak("Opening WhatsApp, Sir.");
                window.location.href = "whatsapp://send";
            }
            else if (cmd.includes("call")) {
                speak("Opening dialer, Sir.");
                window.location.href = "tel:";
            }
            // AI CONVERSATION (Worldwide Knowledge Fallback)
            else if (cmd.includes("hello") || cmd.includes("hi max")) {
                speak("Hello Sir! I am functioning at full capacity. What is your question?");
            }
            else if (cmd.includes("time")) {
                speak("The time is " + new Date().toLocaleTimeString() + ", Sir.");
            }
            else if (cmd.includes("who are you")) {
                speak("I am Max, a robotic AI assistant with access to worldwide information, built by Aryan Sir.");
            }
            else {
                // For worldwide knowledge, Max will answer directly or use Google if complex
                if (cmd.length > 5) {
                    speak("Exploring my data banks for " + cmd + "... One second, Sir.");
                    setTimeout(() => {
                        window.open("https://www.google.com/search?q=" + encodeURIComponent(cmd), "_blank");
                    }, 2000);
                } else {
                    speak("I am listening, Sir. Please give me a clear command.");
                }
            }
        }

        async function toggleTorch(s) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({video: {facingMode: 'environment'}});
                const track = stream.getVideoTracks()[0];
                await track.applyConstraints({advanced: [{torch: s}]});
                if (!s) track.stop();
            } catch (e) { speak("I need camera permission, Sir."); }
        }
    </script>
</body>
</html>
