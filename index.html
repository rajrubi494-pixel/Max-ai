<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max AI - Living Assistant</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            background: radial-gradient(circle at center, #0a0a2a 0%, #000 100%); 
            color: #fff; text-align: center; font-family: 'Segoe UI', Roboto, sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; margin: 0; overflow: hidden; 
        }

        .header-info { position: absolute; top: 20px; width: 90%; display: flex; justify-content: space-between; font-size: 0.9rem; color: #00fbff; text-shadow: 0 0 10px #00fbff; }

        .max-container { position: relative; display: flex; align-items: center; justify-content: center; width: 300px; height: 300px; }
        
        /* The Pulsing Orb */
        .orb { 
            width: 140px; height: 140px; 
            background: radial-gradient(circle, #00fbff, #0072ff, #000); 
            border-radius: 50%; box-shadow: 0 0 50px #0072ff, inset 0 0 20px #fff; 
            cursor: pointer; border: none; z-index: 10;
            transition: all 0.3s ease;
        }
        
        .orb-active { animation: pulse 1.5s infinite; box-shadow: 0 0 80px #00fbff; scale: 1.1; }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 50px #0072ff; }
            50% { transform: scale(1.05); box-shadow: 0 0 100px #00fbff; }
            100% { transform: scale(1); box-shadow: 0 0 50px #0072ff; }
        }

        h2#st { margin-top: 30px; font-weight: 300; font-size: 1.4rem; min-height: 40px; color: #fff; transition: 0.5s; }
        
        .footer { position: absolute; bottom: 20px; font-size: 0.8rem; letter-spacing: 2px; color: rgba(255,255,255,0.4); }
        .footer b { color: #00fbff; text-shadow: 0 0 50px #00fbff; }

        .visualizer { position: absolute; width: 250px; height: 250px; border: 2px solid rgba(0, 251, 255, 0.1); border-radius: 50%; animation: spin 10s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="header-info">
        <div id="time-display">Time: --:--</div>
        <div id="battery-display">Battery: --%</div>
    </div>

    <div class="max-container">
        <div class="visualizer"></div>
        <button class="orb" id="maxOrb" onclick="startMax()"></button>
    </div>

    <h2 id="st">Tap Max to talk</h2>

    <div class="footer">BUILD BY <b>ARYAN</b></div>

    <script>
        const statusText = document.getElementById('st');
        const orb = document.getElementById('maxOrb');
        const timeDisplay = document.getElementById('time-display');
        const batteryDisplay = document.getElementById('battery-display');

        // Update Time & Battery
        function updateStats() {
            const now = new Date();
            timeDisplay.innerText = "Time: " + now.getHours() + ":" + now.getMinutes().toString().padStart(2, '0');
            
            if (navigator.getBattery) {
                navigator.getBattery().then(bat => {
                    batteryDisplay.innerText = "Battery: " + Math.floor(bat.level * 100) + "%";
                });
            }
        }
        setInterval(updateStats, 1000);
        updateStats();

        // Voice Engine
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'en-US';

        function speak(text) {
            window.speechSynthesis.cancel(); // Stop any previous talking
            const speech = new SpeechSynthesisUtterance(text);
            speech.pitch = 1.1;
            speech.rate = 1;
            window.speechSynthesis.speak(speech);
            statusText.innerText = "Max: " + text;
        }

        function startMax() {
            try {
                recognition.start();
                orb.classList.add('orb-active');
                statusText.innerText = "I'm listening...";
            } catch (e) { console.log("Restarting mic..."); }
        }

        recognition.onresult = (e) => {
            orb.classList.remove('orb-active');
            const cmd = e.results[0][0].transcript.toLowerCase();
            statusText.innerText = "You: " + cmd;
            handle(cmd);
        };

        recognition.onerror = () => orb.classList.remove('orb-active');

        function handle(cmd) {
            if (cmd.includes("whatsapp")) {
                speak("Opening WhatsApp for you, Aryan.");
                setTimeout(() => window.location.href = "whatsapp://send", 1000);
            } 
            else if (cmd.includes("light on") || cmd.includes("torch on")) {
                speak("Turning on the flashlight.");
                toggleTorch(true);
            } 
            else if (cmd.includes("light off") || cmd.includes("torch off")) {
                speak("Turning off the flashlight.");
                toggleTorch(false);
            } 
            else if (cmd.includes("time")) {
                speak("The current time is " + new Date().toLocaleTimeString());
            }
            else if (cmd.includes("who are you")) {
                speak("I am Max, a sophisticated AI assistant built by Aryan.");
            }
            else if (cmd.includes("hello") || cmd.includes("hey")) {
                speak("Hello Aryan, how can I help you today?");
            }
            else {
                speak("I heard you say " + cmd + ". How can I help Aryan with that?");
            }
        }

        async function toggleTorch(s) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({video: {facingMode: 'environment'}});
                const track = stream.getVideoTracks()[0];
                await track.applyConstraints({advanced: [{torch: s}]});
                if (!s) track.stop();
            } catch (e) { speak("I can't access the light. Please allow camera permission."); }
        }
    </script>
</body>
</html>
